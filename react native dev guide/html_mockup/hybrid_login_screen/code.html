<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PKN Portal - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- TopAppBar / Header Section -->
<header class="bg-white dark:bg-slate-900 sticky top-0 z-50 shadow-sm">
<!-- Safe-area padding and header content -->
<div class="flex items-center justify-between px-4 py-3">
<button aria-label="Close" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight flex-1 text-center font-display">Login</h2>
<div class="w-10"></div> <!-- Spacer for centering title -->
</div>
<!-- Progress Bar -->
<div class="w-full bg-slate-100 dark:bg-slate-800 h-1">
<div class="bg-primary h-full w-[30%] transition-all duration-500 ease-out"></div>
</div>
</header>
<!-- WebView Content Container -->
<main class="flex-1 w-full max-w-md mx-auto p-6 flex flex-col">
<!-- Branding / Hero Header -->
<div class="pt-8 pb-10 text-center">
<div class="inline-flex items-center justify-center p-3 mb-6 bg-primary/10 rounded-xl">
<span class="material-symbols-outlined text-primary text-4xl">account_balance</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-[32px] font-bold leading-tight mb-3 font-display">Welcome to PKN Portal</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal">Please enter your credentials to continue</p>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">phone_iphone</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="08xx-xxxx-xxxx" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] mt-4" type="submit">
                Login
            </button>
</form>
<!-- Footer / Links -->
<footer class="mt-auto py-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign Up</a>
</p>
<div class="mt-8 flex justify-center items-center gap-6">
<div class="h-[1px] bg-slate-200 dark:bg-slate-700 flex-1 max-w-[40px]"></div>
<span class="text-slate-400 text-xs uppercase tracking-widest font-bold">Secure Access</span>
<div class="h-[1px] bg-slate-200 dark:bg-slate-700 flex-1 max-w-[40px]"></div>
</div>
<div class="mt-6 flex justify-center gap-4">
<img class="h-6 w-auto grayscale opacity-40" data-alt="Government institutional certification badge logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvknHf85vqd8xWGkMchhjt6WGKRgy9Ps1hsYAkTBrGcSF4arau-htvuB0J73uAp8iBtkpWM93itKYejDzLoAvOPl1D6balCT9FQ1RPjop4qh1J7OplBfUEZTB_s76LD_avAfA-JlukvQcoqQYgdP7Rwo1VcQoJ3hRy21PFw6aYCb8EHhflcdQZD4-nu4fdIcBQXkA3pfpWNOB6Nb7KpiE13dAWksQ7L1Yq-Dgf2YiHdz0F7nMKBylaaBcHYdN-kYC_SxXylzR2HjA"/>
<img class="h-6 w-auto grayscale opacity-40" data-alt="Cybersecurity verification seal symbol" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-qYQnsW6-LLCuloA8qq7wjP_aX881LYzZ3KZMBfKcrMRLQnXVDGvoSARm81fr7FZrC8ckkMBFW6U-rVxipyfKNwR8RDEbqDP7dvzK5RvGH_Xuc5wzFgaehuwjMSY9rW5sctCi7O5yONr4upFhtOTc1-Q9E-gVyS_54TGAWC4RZ3wHuF8ImFddGa13SfBzyQh6JTNLDTHnGxcYF7bPeWa5LBA4yZzSmCwTZBDvET5AW-PkxVr4OMPrqFiFYrpTr_yZL1j5oMOXse0"/>
</div>
</footer>
</main>
</body></html>
